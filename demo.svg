61.313%{transform:translateY(-4624px)}
61.320%{transform:translateY(-5202px)}
93.555%{transform:translateY(-5780px)}
100.000%{transform:translateY(-5780px)}
            }

            #screen_view {
                animation-duration: 15517ms;
                animation-iteration-count:infinite;
                animation-name:roll;
                animation-timing-function: steps(1,end);
                animation-fill-mode: forwards;
            }
        ]]></style>
        <style type="text/css" id="user-style">
